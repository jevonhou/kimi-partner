<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kimi Partner — Designer-led workflow</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
    body { color: #171A22; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
    .canvas {
      width: 1280px;
      height: 720px;
      padding: 52px 72px 46px;
      position: relative;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto 1fr auto;
      column-gap: 24px;
      background: #F5F7FC;
    }
    .canvas::before {
      position: absolute;
      top: 0;
      right: 0;
      width: 34%;
      height: 100%;
      content: "";
      background: #FFFFFF;
    }
    .brand, .message, .roles, footer { position: relative; z-index: 1; }
    .brand {
      grid-column: 1 / 5;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #171A22;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.15em;
    }
    .brand img { width: 30px; height: 30px; object-fit: contain; }
    .message {
      grid-column: 1 / 9;
      align-self: center;
      margin-top: 23px;
    }
    .eyebrow {
      margin: 0 0 20px;
      color: #2563EB;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
    }
    h1 {
      max-width: 760px;
      margin: 0;
      color: #171A22;
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1.08;
    }
    h1 em { display: block; color: #7C4DFF; font-style: normal; }
    .support {
      max-width: 520px;
      margin: 26px 0 0;
      color: #5E6678;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.65;
    }
    .roles {
      grid-column: 1 / 13;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-self: end;
    }
    .roles article {
      min-height: 92px;
      padding: 20px 22px;
      display: grid;
      align-content: center;
      gap: 7px;
      background: #FFFFFF;
      border-top: 3px solid #2563EB;
    }
    .roles article:nth-child(2) { border-color: #7C4DFF; }
    .roles article:nth-child(3) { border-color: #171A22; }
    .roles b { color: #171A22; font-size: 20px; line-height: 1.2; }
    .roles span { color: #5E6678; font-size: 13px; line-height: 1.35; }
    footer {
      grid-column: 7 / 13;
      align-self: end;
      color: #5E6678;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <header class="brand"><img src="../../logo/kimi-partner-logo.png" alt=""><span>KIMI PARTNER</span></header>
    <section class="message">
      <p class="eyebrow">DESIGNER-LED WORKFLOW</p>
      <h1>设计师定方向，<em>模型加速落地。</em></h1>
      <p class="support">让 Kimi 发挥前端表现力，让 Codex 守住工程质量。</p>
    </section>
    <section class="roles">
      <article><b>设计师</b><span>目标 · 规范 · 判断</span></article>
      <article><b>Kimi</b><span>前端实现 · 视觉完成度</span></article>
      <article><b>Codex</b><span>范围控制 · 审查验收</span></article>
    </section>
    <footer>github.com/jevonhou/kimi-partner</footer>
  </main>
</body>
</html>
