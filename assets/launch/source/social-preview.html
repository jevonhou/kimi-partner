<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kimi Partner — GitHub social preview</title>
  <link rel="stylesheet" href="launch-system.css">
</head>
<body>
  <main class="canvas canvas-social">
    <header class="masthead masthead-social">
      <p class="kicker"><span>DESIGNER-LED</span><b>OPEN SOURCE</b></p>
      <p class="wordmark">KIMI PARTNER</p>
    </header>

    <section class="hero hero-social">
      <div class="hero-copy">
        <p class="section-label">A CODEX PLUGIN FOR DESIGNER-LED WORKFLOWS</p>
        <h1>设计师定方向，<em>模型加速落地。</em></h1>
        <p class="support"><strong>Kimi</strong> 前端实现 <i>·</i> <strong>Codex</strong> 工程验收</p>
      </div>
      <aside class="mark-board mark-board-social" aria-label="Kimi Partner brand mark">
        <span class="measure measure-top">VISUAL SYSTEM / 01</span>
        <img src="../../logo/kimi-partner-logo-256.png" alt="Kimi Partner Logo">
        <span class="measure measure-bottom">DESIGN · IMPLEMENT · VERIFY</span>
      </aside>
    </section>

    <section class="roles roles-social" aria-label="协作角色">
      <article class="role role-designer"><i>01</i><b>设计师主导</b><span>目标与体验标准</span></article>
      <article class="role role-kimi"><i>02</i><b>模型加速实现</b><span>Kimi 前端落地</span></article>
      <article class="role role-codex"><i>03</i><b>Codex 工程验收</b><span>范围 · 审查 · 测试</span></article>
    </section>

    <footer class="footer footer-social">
      <p><img class="footer-mark" src="../../logo/kimi-partner-logo-256.png" alt="">KIMI PARTNER</p>
      <p class="repository">github.com/jevonhou/kimi-partner</p>
    </footer>
  </main>
</body>
</html>
